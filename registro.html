<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto+Slab:wght@100..900&family=Sekuya&display=swap" rel="stylesheet">
   
    <title>REGISTRATE</title>
    
</head>
<body>

    
   
    

    <div class="formularioregistro">

        <h1 class="titulo">REGISTRATE</h1>
        <form action="sesion.html" method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        <br><br>

        <label for="nickname">Nickname:</label>
        <input type="text" id="nickname" name="nickname" placeholder="Tu alias" required>
        <br><br>


        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label for="date">Fecha de nacimiento:</label>
        <input type="date" id="date" name="date" required>
        <br><br>

        
        <div class="container">
  <a href="registroexito.html" class="btn rounded">
    <span class="text-green">Registrarse</span>
  </a>
</div>

    </form>
    </div>

    


    
<script>
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault(); // evita que se envíe el formulario
      const form = e.target.form;
      const index = Array.prototype.indexOf.call(form, e.target);
      form.elements[index + 1]?.focus(); // pasa al siguiente input
    }
  });
</script>

</body>
</html>
